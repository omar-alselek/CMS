<div class="min-vh-100" style="background:#f0f2f5;">

  <!-- Sidebar + Content -->
  <div class="d-flex">

    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-bold mb-0">Dashboard</h4>
          <div class="text-muted small">Welcome back, {{ fullName }}</div>
        </div>
      </div>

      <!-- Stats Cards Row 1 -->
      <div class="row g-3 mb-3">

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="text-muted small fw-semibold text-uppercase mb-1">
                    Total Patients
                  </div>
                  <div class="fw-bold" style="font-size:2rem;">
                    {{ totalPatients }}
                  </div>
                </div>
                <div class="rounded-3 p-2"
                     style="background:#e8f4fd; font-size:1.5rem;">👥</div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="text-muted small fw-semibold text-uppercase mb-1">
                    Total Doctors
                  </div>
                  <div class="fw-bold" style="font-size:2rem;">
                    {{ totalDoctors }}
                  </div>
                </div>
                <div class="rounded-3 p-2"
                     style="background:#e8f8f0; font-size:1.5rem;">🩺</div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="text-muted small fw-semibold text-uppercase mb-1">
                    Total Appointments
                  </div>
                  <div class="fw-bold" style="font-size:2rem;">
                    {{ totalAppointments }}
                  </div>
                </div>
                <div class="rounded-3 p-2"
                     style="background:#fef3e8; font-size:1.5rem;">📅</div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Stats Cards Row 2 -->
      <div class="row g-3 mb-4">

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3"
               style="border-left: 4px solid #ffc107 !important;">
            <div class="card-body p-3">
              <div class="text-muted small">Scheduled</div>
              <div class="fw-bold fs-4 text-warning">
                {{ scheduledAppointments }}
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3"
               style="border-left: 4px solid #198754 !important;">
            <div class="card-body p-3">
              <div class="text-muted small">Completed</div>
              <div class="fw-bold fs-4 text-success">
                {{ completedAppointments }}
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3"
               style="border-left: 4px solid #dc3545 !important;">
            <div class="card-body p-3">
              <div class="text-muted small">Cancelled</div>
              <div class="fw-bold fs-4 text-danger">
                {{ cancelledAppointments }}
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Appointments Chart -->
      <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4">
          <h6 class="fw-bold mb-3">Appointments Overview</h6>
          <div style="position: relative; height: 350px;">
            <canvas baseChart
                    [data]="appointmentsChartData"
                    [options]="appointmentsChartOptions"
                    [type]="'doughnut'">
            </canvas>
          </div>
        </div>
      </div>

    </div> <!-- End Main Content -->
  </div> <!-- End Sidebar + Content -->
</div> <!-- End Root Div -->
